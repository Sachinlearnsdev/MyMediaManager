{% extends "base.html" %}
{% block title %}Library - MyMediaManager{% endblock %}

{% block content %}
<div x-data="libraryApp()">
    <div class="page-header">
        <h2>Library</h2>
        <div class="page-actions">
            <select x-model="newHours" @change="refresh()" style="width:auto;min-width:140px;padding:0.3rem 1.8rem 0.3rem 0.5rem;font-size:0.8rem">
                <option value="1">Last 1 hour</option>
                <option value="6">Last 6 hours</option>
                <option value="24">Last 24 hours</option>
                <option value="72">Last 3 days</option>
                <option value="168">Last 7 days</option>
                <option value="720">Last 30 days</option>
            </select>
            <button class="btn btn-outline btn-sm" @click="refresh()" :disabled="loading">
                <span class="spinner" x-show="loading" x-cloak></span>
                Refresh
            </button>
        </div>
    </div>

    <!-- Overview Cards -->
    <div class="lib-overview-grid">
        <template x-for="(cat, id) in data.categories" :key="id">
            <button class="lib-overview-card" :class="{ active: activeCategory === id }"
                    @click="activeCategory = (activeCategory === id ? null : id)">
                <div class="lib-ov-color" :style="'background:' + cat.color"></div>
                <div class="lib-ov-body">
                    <div class="lib-ov-label" x-text="cat.label"></div>
                    <div class="lib-ov-stats">
                        <span class="lib-ov-total" x-text="cat.total_files + ' files'"></span>
                        <span class="lib-ov-new" x-show="cat.new_files > 0"
                              x-text="cat.new_files + ' new'"></span>
                    </div>
                </div>
                <div class="lib-ov-count" x-text="cat.entries.length">0</div>
            </button>
        </template>
    </div>

    <!-- Empty state -->
    <div class="card" x-show="!activeCategory && !loading" style="text-align:center;padding:3rem">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="var(--text-muted)" stroke-width="1.5" style="opacity:0.3;margin-bottom:1rem">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <p style="color:var(--text-muted);font-size:0.9rem">Select a category above to browse your library.</p>
        <p style="color:var(--text-muted);font-size:0.78rem;margin-top:0.5rem">
            Library root: <code x-text="data.library_root"></code>
        </p>
    </div>

    <!-- Category Browser -->
    <template x-if="activeCategory && data.categories[activeCategory]">
        <div>
            <!-- Search & Filter Bar -->
            <div class="lib-search-bar">
                <div class="lib-search-wrap">
                    <svg class="lib-search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" x-model.debounce.200ms="searchQuery" placeholder="Search files and folders..."
                           class="lib-search-input">
                </div>
                <label class="lib-filter-toggle">
                    <input type="checkbox" x-model="showNewOnly"> New only
                </label>
                <span class="lib-result-count" x-text="filteredEntries.length + ' items'"></span>
            </div>

            <!-- Entries List -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">
                        <span class="lib-cat-dot" :style="'background:' + data.categories[activeCategory].color"></span>
                        <span x-text="data.categories[activeCategory].label"></span>
                    </h3>
                    <span class="badge badge-sm" x-text="data.categories[activeCategory].total_files + ' files'"></span>
                </div>

                <div x-show="!data.categories[activeCategory].exists" style="text-align:center;padding:2rem;color:var(--text-muted)">
                    <p>Folder does not exist yet. It will be created when the pipeline runs.</p>
                </div>

                <div x-show="data.categories[activeCategory].exists && filteredEntries.length === 0"
                     style="text-align:center;padding:2rem;color:var(--text-muted)">
                    <p>No items match your search.</p>
                </div>

                <!-- Folder entries (shows/collections) -->
                <div class="lib-entries">
                    <template x-for="entry in filteredEntries.slice(0, displayLimit)" :key="entry.name">
                        <div>
                            <!-- Folder row -->
                            <div x-show="entry.type === 'folder'" class="lib-folder-row"
                                 :class="{ 'lib-has-new': entry.has_new }"
                                 @click="toggleFolder(entry.name)">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                                     :style="'color:' + (expandedFolders[entry.name] ? 'var(--accent)' : 'var(--warning)')">
                                    <path x-show="!expandedFolders[entry.name]"
                                          d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                                    <path x-show="expandedFolders[entry.name]" x-cloak
                                          d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2v1M2 10h20"/>
                                </svg>
                                <span class="lib-folder-name" x-text="entry.name"></span>
                                <span class="lib-badge-new" x-show="entry.has_new">NEW</span>
                                <span class="lib-folder-meta" x-text="entry.file_count + ' files'"></span>
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
                                     style="color:var(--text-muted);transition:transform 0.2s"
                                     :style="expandedFolders[entry.name] ? 'transform:rotate(180deg)' : ''">
                                    <polyline points="6 9 12 15 18 9"/>
                                </svg>
                            </div>
                            <!-- Expanded content (subfolders + direct files) -->
                            <div x-show="entry.type === 'folder' && expandedFolders[entry.name]" x-cloak class="lib-file-list">
                                <!-- Season subfolders -->
                                <template x-for="sf in (entry.subfolders || [])" :key="sf.name">
                                    <div>
                                        <div class="lib-subfolder-row"
                                             :class="{ 'lib-has-new': sf.has_new }"
                                             @click="toggleSubfolder(entry.name, sf.name)">
                                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
                                                 :style="'color:' + (expandedSubfolders[entry.name + '/' + sf.name] ? 'var(--accent)' : 'var(--text-muted)')">
                                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                                            </svg>
                                            <span class="lib-subfolder-name" x-text="sf.name"></span>
                                            <span class="lib-badge-new" x-show="sf.has_new">NEW</span>
                                            <span class="lib-folder-meta" x-text="sf.file_count + ' files'"></span>
                                            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"
                                                 style="color:var(--text-muted);transition:transform 0.2s"
                                                 :style="expandedSubfolders[entry.name + '/' + sf.name] ? 'transform:rotate(180deg)' : ''">
                                                <polyline points="6 9 12 15 18 9"/>
                                            </svg>
                                        </div>
                                        <!-- Files inside season subfolder -->
                                        <div x-show="expandedSubfolders[entry.name + '/' + sf.name]" x-cloak class="lib-subfile-list">
                                            <template x-for="file in sf.files" :key="file.name">
                                                <div class="lib-file-row lib-nested" :class="{ 'lib-file-new': file.is_new }">
                                                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted);flex-shrink:0">
                                                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                                                        <polyline points="13 2 13 9 20 9"/>
                                                    </svg>
                                                    <span class="lib-file-name" x-text="file.name"></span>
                                                    <span class="lib-badge-new" x-show="file.is_new">NEW</span>
                                                    <span class="lib-file-size" x-text="file.size_mb + ' MB'"></span>
                                                    <span class="lib-file-date" x-text="formatDate(file.modified)"></span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                                <!-- Direct files (not in subfolders) -->
                                <template x-for="file in (entry.files || [])" :key="file.rel_path || file.name">
                                    <div class="lib-file-row" :class="{ 'lib-file-new': file.is_new }">
                                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted);flex-shrink:0">
                                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                                            <polyline points="13 2 13 9 20 9"/>
                                        </svg>
                                        <span class="lib-file-name" x-text="file.name"></span>
                                        <span class="lib-badge-new" x-show="file.is_new">NEW</span>
                                        <span class="lib-file-size" x-text="file.size_mb + ' MB'"></span>
                                        <span class="lib-file-date" x-text="formatDate(file.modified)"></span>
                                    </div>
                                </template>
                            </div>

                            <!-- File row (standalone, e.g. movies) -->
                            <div x-show="entry.type === 'file'" class="lib-file-row lib-standalone"
                                 :class="{ 'lib-file-new': entry.is_new }">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted);flex-shrink:0">
                                    <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                                    <polyline points="13 2 13 9 20 9"/>
                                </svg>
                                <span class="lib-file-name" x-text="entry.name"></span>
                                <span class="lib-badge-new" x-show="entry.is_new">NEW</span>
                                <span class="lib-file-size" x-text="entry.size_mb + ' MB'"></span>
                                <span class="lib-file-date" x-text="formatDate(entry.modified)"></span>
                            </div>
                        </div>
                    </template>
                </div>

                <div x-show="filteredEntries.length > displayLimit" style="text-align:center;padding:0.75rem">
                    <button class="btn btn-outline btn-xs" @click="displayLimit += 50"
                            x-text="'Show more (' + (filteredEntries.length - displayLimit) + ' remaining)'"></button>
                </div>
            </div>
        </div>
    </template>
</div>
{% endblock %}

{% block scripts %}
<style>
/* ── Library Overview Grid ── */
.lib-overview-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.6rem; margin-bottom: 1.25rem;
}
.lib-overview-card {
    display: flex; align-items: center; gap: 0.65rem;
    padding: 0.75rem 0.85rem; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg-card);
    cursor: pointer; transition: all 0.2s; text-align: left;
    font-family: inherit;
}
.lib-overview-card:hover { border-color: var(--border-hover); }
.lib-overview-card.active { border-color: var(--accent); background: rgba(59,130,246,0.06); }
.lib-ov-color { width: 4px; height: 36px; border-radius: 2px; flex-shrink: 0; }
.lib-ov-body { flex: 1; min-width: 0; }
.lib-ov-label { font-size: 0.82rem; font-weight: 600; color: var(--text-primary); }
.lib-ov-stats { display: flex; gap: 0.5rem; margin-top: 0.15rem; }
.lib-ov-total { font-size: 0.72rem; color: var(--text-muted); }
.lib-ov-new {
    font-size: 0.65rem; font-weight: 700; color: var(--success);
    background: rgba(34,197,94,0.1); padding: 0.05rem 0.35rem; border-radius: 3px;
}
.lib-ov-count {
    font-size: 1.1rem; font-weight: 700; color: var(--text-muted);
    min-width: 28px; text-align: right;
}

/* ── Library Search Bar ── */
.lib-search-bar {
    display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
    margin-bottom: 0.75rem; padding: 0.6rem 0.85rem;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
}
.lib-search-wrap {
    display: flex; align-items: center; gap: 0.5rem; flex: 1; min-width: 200px;
    background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px;
    padding: 0.45rem 0.75rem; transition: border-color 0.2s;
}
.lib-search-wrap:focus-within { border-color: var(--accent); }
.lib-search-icon { opacity: 0.4; flex-shrink: 0; }
.lib-search-input {
    border: none; background: transparent; outline: none;
    color: var(--text-primary); font-size: 0.85rem; width: 100%; padding: 0;
}
.lib-search-input::placeholder { color: var(--text-muted); }
.lib-filter-toggle {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.8rem; color: var(--text-secondary); cursor: pointer; white-space: nowrap;
}
.lib-result-count { font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }

/* ── Category dot ── */
.lib-cat-dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    margin-right: 0.4rem; vertical-align: middle;
}

/* ── Entries list ── */
.lib-entries { max-height: 65vh; overflow-y: auto; }

/* ── Folder rows ── */
.lib-folder-row {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.55rem 0.75rem; cursor: pointer;
    border-bottom: 1px solid rgba(42,47,62,0.3);
    transition: background 0.1s;
}
.lib-folder-row:hover { background: rgba(59,130,246,0.03); }
.lib-folder-row.lib-has-new { border-left: 3px solid var(--success); }
.lib-folder-name { font-size: 0.88rem; font-weight: 500; color: var(--text-primary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lib-folder-meta { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; }

/* ── Subfolder rows (Season folders inside show folders) ── */
.lib-subfolder-row {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.4rem 0.75rem 0.4rem 2.25rem; cursor: pointer;
    border-bottom: 1px solid rgba(42,47,62,0.15);
    transition: background 0.1s;
    font-size: 0.84rem;
}
.lib-subfolder-row:hover { background: rgba(59,130,246,0.03); }
.lib-subfolder-row.lib-has-new { border-left: 3px solid var(--success); }
.lib-subfolder-name { font-weight: 500; color: var(--text-secondary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lib-subfile-list { background: rgba(0,0,0,0.05); }

/* ── File rows ── */
.lib-file-list { background: var(--bg-input); border-bottom: 1px solid rgba(42,47,62,0.3); }
.lib-file-row {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.35rem 0.75rem 0.35rem 2.25rem;
    font-size: 0.82rem;
    border-bottom: 1px solid rgba(42,47,62,0.15);
}
.lib-file-row.lib-nested { padding-left: 3.5rem; } /* Deeper indent for files inside season subfolders */
.lib-file-row.lib-standalone { padding-left: 0.75rem; padding: 0.5rem 0.75rem; border-bottom: 1px solid rgba(42,47,62,0.3); }
.lib-file-row:last-child { border-bottom: none; }
.lib-file-row.lib-file-new { background: rgba(34,197,94,0.04); }
.lib-file-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-secondary); }
.lib-file-size { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; min-width: 55px; text-align: right; }
.lib-file-date { font-size: 0.68rem; color: var(--text-muted); white-space: nowrap; min-width: 80px; text-align: right; }

/* ── NEW badge ── */
.lib-badge-new {
    font-size: 0.6rem; font-weight: 700; color: var(--success);
    background: rgba(34,197,94,0.12); padding: 0.1rem 0.35rem;
    border-radius: 3px; letter-spacing: 0.05em; flex-shrink: 0;
}

/* ── Light theme adjustments ── */
[data-theme="light"] .lib-folder-row { border-bottom-color: var(--border); }
[data-theme="light"] .lib-subfolder-row { border-bottom-color: var(--border); }
[data-theme="light"] .lib-file-row { border-bottom-color: var(--border); }
[data-theme="light"] .lib-file-list { border-bottom-color: var(--border); }
[data-theme="light"] .lib-subfile-list { background: rgba(0,0,0,0.02); }

/* ── Responsive ── */
@media (max-width: 1200px) { .lib-overview-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 768px) { .lib-overview-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px) { .lib-overview-grid { grid-template-columns: 1fr; } }
</style>
<script>
function libraryApp() {
    return {
        data: { categories: {}, library_root: '', total_files: 0, new_files: 0, new_hours: 24 },
        loading: false,
        activeCategory: null,
        searchQuery: '',
        showNewOnly: false,
        expandedFolders: {},
        expandedSubfolders: {},
        displayLimit: 100,
        newHours: '24',

        init() {
            this.refresh();
        },

        async refresh() {
            this.loading = true;
            try {
                const resp = await fetch('/api/library?new_hours=' + this.newHours);
                this.data = await resp.json();
            } catch (e) {
                console.error('Library load failed:', e);
            }
            this.loading = false;
        },

        get filteredEntries() {
            if (!this.activeCategory || !this.data.categories[this.activeCategory]) return [];
            let entries = this.data.categories[this.activeCategory].entries;
            if (this.showNewOnly) {
                entries = entries.filter(e => e.type === 'file' ? e.is_new : e.has_new);
            }
            if (this.searchQuery) {
                const q = this.searchQuery.toLowerCase();
                entries = entries.filter(e => {
                    if (e.name.toLowerCase().includes(q)) return true;
                    if (e.type === 'folder') {
                        // Search in direct files
                        if (e.files && e.files.some(f => f.name.toLowerCase().includes(q))) return true;
                        // Search in subfolder files
                        if (e.subfolders && e.subfolders.some(sf =>
                            sf.name.toLowerCase().includes(q) ||
                            sf.files.some(f => f.name.toLowerCase().includes(q))
                        )) return true;
                    }
                    return false;
                });
            }
            return entries;
        },

        toggleFolder(name) {
            this.expandedFolders[name] = !this.expandedFolders[name];
        },

        toggleSubfolder(folder, subfolder) {
            const key = folder + '/' + subfolder;
            this.expandedSubfolders[key] = !this.expandedSubfolders[key];
        },

        formatDate(ts) {
            if (!ts) return '';
            const d = new Date(ts * 1000);
            const now = new Date();
            const diff = (now - d) / 1000;
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
            return d.toLocaleDateString();
        },
    };
}
</script>
{% endblock %}
