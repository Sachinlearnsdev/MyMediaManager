<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MyMediaManager</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #11151c;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            color: #e2e8f0;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem 2rem;
            background: #1a1f2e;
            border: 1px solid #2a2f3e;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header .logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            font-size: 1.5rem;
            color: white;
            font-weight: bold;
        }
        .login-header h1 {
            font-size: 1.4rem;
            color: #e2e8f0;
            margin-bottom: 0.25rem;
        }
        .login-header p {
            color: #64748b;
            font-size: 0.85rem;
        }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 0.4rem;
            font-weight: 500;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap input {
            width: 100%;
            padding: 0.65rem 2.5rem 0.65rem 0.85rem;
            background: #0f1219;
            border: 1px solid #2a2f3e;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-wrap input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .input-wrap input::placeholder { color: #475569; }
        .eye-btn {
            position: absolute;
            right: 0.6rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            padding: 0.2rem;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }
        .eye-btn:hover { color: #94a3b8; }
        .eye-btn svg { width: 18px; height: 18px; }
        .login-btn {
            width: 100%;
            padding: 0.7rem;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .login-btn:hover { opacity: 0.9; }
        .login-btn:active { transform: scale(0.98); }
        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #f87171;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        .help-text {
            text-align: center;
            font-size: 0.75rem;
            color: #475569;
            margin-top: 1.5rem;
        }
        .default-creds {
            text-align: center;
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 1rem;
            padding: 0.6rem;
            background: rgba(59,130,246,0.05);
            border: 1px solid rgba(59,130,246,0.1);
            border-radius: 8px;
        }
        .default-creds code {
            color: #93c5fd;
            background: rgba(59,130,246,0.1);
            padding: 0.1rem 0.35rem;
            border-radius: 4px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div>
        <div class="login-card">
            <div class="login-header">
                <div class="logo">M</div>
                <h1>MyMediaManager</h1>
                <p>Sign in to your control panel</p>
            </div>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                <div class="error-msg">{{ message }}</div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" name="password"
                               placeholder="Enter your password" autofocus required
                               autocomplete="current-password">
                        <button type="button" class="eye-btn" onclick="togglePassword('password', this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="login-btn">Log in</button>
            </form>

            <div class="default-creds">
                Default password: <code>admin</code>
            </div>
        </div>

        <p class="help-text">
            Forgot password? Clear <code style="color:#64748b">password_hash</code> in config.json
        </p>
    </div>

    <script>
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.innerHTML = isPassword
            ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
            : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    }
    </script>
</body>
</html>
